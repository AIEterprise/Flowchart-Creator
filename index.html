<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flowchart Creator</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas for High Fidelity PNG Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pure-white': '#FFFFFF',
                        'off-white': '#F8FAFC',
                        'charcoal': '#1E1E24',
                        'slate': '#334155',
                        'sea-green': '#14B8A6',
                        'mint-green': '#10B981'
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overscroll-behavior: none;
        }
        
        .grid-bg {
            background-image: radial-gradient(rgba(51, 65, 85, 0.12) 1.5px, transparent 1.5px);
        }
        
        .dark .grid-bg {
            background-image: radial-gradient(rgba(255, 255, 255, 0.12) 1.5px, transparent 1.5px);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            transition: background 0.3s, border-color 0.3s;
        }
        
        .dark .glass-panel {
            background: rgba(30, 30, 36, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .node-shape-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: background-color 0.2s, color 0.2s, box-shadow 0.2s;
        }
        
        .dark .node-shape-bg {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        }
        
        .node-group:hover .node-shape-bg {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .node-content {
            position: relative;
            z-index: 10;
            min-width: 140px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            outline: none;
            cursor: text;
        }

        .anchor {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #FFFFFF;
            border: 2px solid #14B8A6;
            border-radius: 50%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s ease-out, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: crosshair;
        }
        
        .dark .anchor {
            background: #1E1E24;
        }

        .node-group:hover .anchor, body.is-connecting .anchor {
            opacity: 1;
        }

        .anchor-n { top: -6px; left: 50%; transform: translateX(-50%); }
        .anchor-s { bottom: -6px; left: 50%; transform: translateX(-50%); }
        .anchor-e { right: -6px; top: 50%; transform: translateY(-50%); }
        .anchor-w { left: -6px; top: 50%; transform: translateY(-50%); }
        
        .anchor-n:hover { transform: translateX(-50%) scale(1.4); }
        .anchor-s:hover { transform: translateX(-50%) scale(1.4); }
        .anchor-e:hover { transform: translateY(-50%) scale(1.4); }
        .anchor-w:hover { transform: translateY(-50%) scale(1.4); }

        .connection-line {
            fill: none;
            stroke: #14B8A6;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .connection-line-temp {
            stroke-dasharray: 8 8;
            stroke: #10B981;
            opacity: 0.8;
        }

        #canvas-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
        }
    </style>
</head>
<body class="bg-off-white dark:bg-charcoal text-charcoal dark:text-off-white w-full h-full overflow-hidden font-sans selection:bg-mint-green selection:text-white transition-colors duration-300">

    <!-- Top Bar -->
    <header class="fixed top-0 left-0 w-full flex justify-between items-center px-5 py-4 glass-panel z-[100] border-b border-slate/5 dark:border-white/5">
        <h1 class="font-bold text-lg flex items-center gap-2"><i data-lucide="git-commit" class="text-sea-green"></i> Flowchart Creator</h1>
        <div class="flex items-center gap-3">
            <button id="btn-theme-toggle" class="p-2.5 rounded-full hover:bg-slate/10 dark:hover:bg-white/10 transition-colors" title="Toggle Theme">
                <i data-lucide="moon" id="icon-moon" class="w-5 h-5 block dark:hidden"></i>
                <i data-lucide="sun" id="icon-sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
            <button id="btn-export" class="bg-sea-green hover:bg-mint-green text-white px-5 py-2.5 rounded-full font-semibold text-sm flex items-center gap-2 transition-all shadow-md hover:shadow-lg active:scale-95">
                <i data-lucide="download" class="w-4 h-4"></i> Export PNG
            </button>
        </div>
    </header>

    <!-- Canvas Area -->
    <div id="viewport" class="absolute inset-0 w-full h-full cursor-grab active:cursor-grabbing overflow-hidden">
        <div id="canvas-container" class="absolute top-0 left-0 w-full h-full origin-top-left">
            <div id="canvas-grid" class="absolute inset-[-10000px] grid-bg"></div>
            <!-- Connections Layer -->
            <svg id="canvas-svg"></svg>
            <!-- Nodes Layer -->
            <div id="canvas-nodes" class="absolute top-0 left-0 w-full h-full"></div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="fixed hidden glass-panel p-2.5 rounded-2xl shadow-xl z-[110] flex gap-2.5 transition-opacity border border-transparent dark:border-white/10">
        <button id="ctx-color" class="w-9 h-9 rounded-full border-2 border-slate/10 dark:border-white/20 flex items-center justify-center hover:scale-110 transition-transform shadow-sm" title="Change Color">
            <i data-lucide="palette" class="w-4 h-4 mix-blend-difference text-white"></i>
        </button>
        <button id="ctx-text-color" class="w-9 h-9 rounded-full border border-slate/10 dark:border-white/20 bg-white dark:bg-charcoal flex items-center justify-center hover:scale-110 transition-transform shadow-sm" title="Toggle Text Color">
            <i data-lucide="type" class="w-4 h-4"></i>
        </button>
        <div class="w-px h-8 bg-slate/10 dark:bg-white/10 mx-0.5 self-center"></div>
        <button id="ctx-delete" class="w-9 h-9 rounded-full bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 flex items-center justify-center hover:scale-110 transition-transform shadow-sm" title="Delete Node">
            <i data-lucide="trash-2" class="w-4 h-4 text-red-500 dark:text-red-400"></i>
        </button>
    </div>

    <!-- FAB -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center">
        <div id="fab-menu" class="hidden flex gap-4 mb-5 glass-panel p-4 rounded-3xl shadow-xl transition-all duration-300 origin-bottom scale-95 opacity-0 border border-transparent dark:border-white/10">
            <button class="add-shape group flex flex-col items-center gap-1.5" data-shape="rounded-rect">
                <div class="w-14 h-9 border-[2.5px] border-slate/20 dark:border-white/20 rounded-xl group-hover:border-sea-green dark:group-hover:border-sea-green group-hover:bg-sea-green/10 transition-all"></div>
                <span class="text-[11px] font-semibold text-slate/70 dark:text-off-white/70 group-hover:text-sea-green dark:group-hover:text-sea-green">Rounded</span>
            </button>
            <button class="add-shape group flex flex-col items-center gap-1.5" data-shape="rect">
                <div class="w-14 h-9 border-[2.5px] border-slate/20 dark:border-white/20 group-hover:border-sea-green dark:group-hover:border-sea-green group-hover:bg-sea-green/10 transition-all"></div>
                <span class="text-[11px] font-semibold text-slate/70 dark:text-off-white/70 group-hover:text-sea-green dark:group-hover:text-sea-green">Rectangle</span>
            </button>
            <button class="add-shape group flex flex-col items-center gap-1.5" data-shape="oval">
                <div class="w-14 h-9 border-[2.5px] border-slate/20 dark:border-white/20 rounded-full group-hover:border-sea-green dark:group-hover:border-sea-green group-hover:bg-sea-green/10 transition-all"></div>
                <span class="text-[11px] font-semibold text-slate/70 dark:text-off-white/70 group-hover:text-sea-green dark:group-hover:text-sea-green">Oval</span>
            </button>
            <button class="add-shape group flex flex-col items-center gap-1.5" data-shape="parallelogram">
                <div class="w-14 h-9 border-[2.5px] border-slate/20 dark:border-white/20 skew-x-[-15deg] group-hover:border-sea-green dark:group-hover:border-sea-green group-hover:bg-sea-green/10 transition-all"></div>
                <span class="text-[11px] font-semibold text-slate/70 dark:text-off-white/70 group-hover:text-sea-green dark:group-hover:text-sea-green">Parallel</span>
            </button>
        </div>
        <button id="btn-fab" class="w-16 h-16 bg-sea-green hover:bg-mint-green text-white rounded-full flex items-center justify-center shadow-xl transition-transform hover:scale-105 active:scale-95 border-4 border-white dark:border-charcoal">
            <i data-lucide="plus" class="w-7 h-7 transform transition-transform duration-300" id="fab-icon"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();

        // --- Theme Toggle ---
        const themeToggleBtn = document.getElementById('btn-theme-toggle');
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // --- Data State ---
        const state = {
            nodes: [],
            connections: [],
            pan: { x: 0, y: 0, scale: 1 },
            selectedNodeId: null
        };

        const bgColors = ['bg-pure-white dark:bg-slate-800', 'bg-slate dark:bg-slate-600', 'bg-mint-green dark:bg-sea-green', 'bg-charcoal dark:bg-black'];
        const textColors = ['text-charcoal dark:text-off-white', 'text-white'];
        let idCounter = 0;

        // --- DOM Elements ---
        const viewport = document.getElementById('viewport');
        const canvasContainer = document.getElementById('canvas-container');
        const canvasGrid = document.getElementById('canvas-grid');
        const canvasNodes = document.getElementById('canvas-nodes');
        const canvasSvg = document.getElementById('canvas-svg');
        const fabBtn = document.getElementById('btn-fab');
        const fabMenu = document.getElementById('fab-menu');
        const fabIcon = document.getElementById('fab-icon');
        const contextMenu = document.getElementById('context-menu');

        // --- Engine: Viewport & Panning ---
        let isPanning = false;
        let startPan = { x: 0, y: 0 };
        let initialPinchDistance = null;
        let initialPinchScale = 1;

        function updateTransform() {
            canvasContainer.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.pan.scale})`;
            canvasGrid.style.backgroundPosition = `${state.pan.x / state.pan.scale}px ${state.pan.y / state.pan.scale}px`;
            canvasGrid.style.backgroundSize = `24px 24px`;
        }

        viewport.addEventListener('pointerdown', (e) => {
            if (e.target === viewport || e.target === canvasContainer || e.target === canvasGrid) {
                isPanning = true;
                startPan = { x: e.clientX - state.pan.x, y: e.clientY - state.pan.y };
                viewport.setPointerCapture(e.pointerId);
                hideContextMenu();
                
                if (!fabMenu.classList.contains('opacity-0')) {
                    fabBtn.click();
                }
            }
        });

        viewport.addEventListener('pointermove', (e) => {
            if (isPanning) {
                state.pan.x = e.clientX - startPan.x;
                state.pan.y = e.clientY - startPan.y;
                updateTransform();
                updateContextMenuPosition();
            }
            if (isConnecting && currentConnection) {
                updateTempConnection(e.clientX, e.clientY);
            }
        });

        viewport.addEventListener('pointerup', (e) => {
            if (isPanning) {
                isPanning = false;
                viewport.releasePointerCapture(e.pointerId);
            }
            if (isConnecting) {
                cancelConnection();
            }
        });

        // Wheel Zoom
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 1.06;
            const delta = e.deltaY < 0 ? zoomFactor : 1 / zoomFactor;
            
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            const newScale = Math.min(Math.max(0.15, state.pan.scale * delta), 4);
            const ratio = newScale / state.pan.scale;

            state.pan.x = mouseX - (mouseX - state.pan.x) * ratio;
            state.pan.y = mouseY - (mouseY - state.pan.y) * ratio;
            state.pan.scale = newScale;
            
            updateTransform();
            updateContextMenuPosition();
        }, { passive: false });

        // Touch Pinch
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPanning = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialPinchScale = state.pan.scale;
            }
        }, {passive: false});

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const delta = dist / initialPinchDistance;
                const newScale = Math.min(Math.max(0.15, initialPinchScale * delta), 4);
                
                const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                
                const ratio = newScale / state.pan.scale;
                state.pan.x = cx - (cx - state.pan.x) * ratio;
                state.pan.y = cy - (cy - state.pan.y) * ratio;
                state.pan.scale = newScale;
                updateTransform();
                updateContextMenuPosition();
            }
        }, {passive: false});

        // --- Engine: Rendering & Reactivity ---
        function render() {
            const existingIds = new Set(Array.from(canvasNodes.children).map(n => n.id));
            const stateIds = new Set(state.nodes.map(n => n.id));
            
            existingIds.forEach(id => {
                if (!stateIds.has(id)) document.getElementById(id).remove();
            });
            
            state.nodes.forEach(node => {
                let el = document.getElementById(node.id);
                if (!el) {
                    el = createNodeDOM(node);
                    canvasNodes.appendChild(el);
                }
                updateNodeDOM(el, node);
            });
            
            renderConnections();
        }

        const shapeStyles = {
            'rounded-rect': 'rounded-2xl',
            'rect': 'rounded-none',
            'oval': 'rounded-[100px]',
            'parallelogram': 'skew-x-[-15deg] rounded-lg'
        };

        function createNodeDOM(node) {
            const el = document.createElement('div');
            el.id = node.id;
            el.className = `node-group absolute cursor-grab active:cursor-grabbing font-medium text-sm text-center flex flex-col justify-center items-center`;
            
            const shapeClass = shapeStyles[node.type];
            
            el.innerHTML = `
                <div class="node-shape-bg ${shapeClass} ${node.bgColor}"></div>
                <div class="node-content ${node.textColor}" contenteditable="true" spellcheck="false" data-node-id="${node.id}">${node.text}</div>
                <div class="anchor anchor-n" data-node-id="${node.id}" data-dir="n"></div>
                <div class="anchor anchor-s" data-node-id="${node.id}" data-dir="s"></div>
                <div class="anchor anchor-e" data-node-id="${node.id}" data-dir="e"></div>
                <div class="anchor anchor-w" data-node-id="${node.id}" data-dir="w"></div>
            `;

            let isDraggingNode = false;
            let dragOffset = {x:0, y:0};
            let hasMoved = false;

            const content = el.querySelector('.node-content');

            el.addEventListener('pointerdown', (e) => {
                if (e.target.classList.contains('anchor')) return;
                // If the user is currently editing text, don't interrupt their selection dragging
                if (document.activeElement === content) return;
                
                isDraggingNode = true;
                hasMoved = false;
                e.stopPropagation();
                
                const nodeX = parseFloat(el.style.left);
                const nodeY = parseFloat(el.style.top);
                const mouseUnscaledX = (e.clientX - state.pan.x) / state.pan.scale;
                const mouseUnscaledY = (e.clientY - state.pan.y) / state.pan.scale;
                
                dragOffset = { x: mouseUnscaledX - nodeX, y: mouseUnscaledY - nodeY };
                el.setPointerCapture(e.pointerId);
                
                state.selectedNodeId = node.id;
                showContextMenu(node);
                canvasNodes.appendChild(el); 
            });

            el.addEventListener('pointermove', (e) => {
                if (isDraggingNode) {
                    hasMoved = true;
                    const mouseUnscaledX = (e.clientX - state.pan.x) / state.pan.scale;
                    const mouseUnscaledY = (e.clientY - state.pan.y) / state.pan.scale;
                    node.x = mouseUnscaledX - dragOffset.x;
                    node.y = mouseUnscaledY - dragOffset.y;
                    updateNodeDOM(el, node);
                    renderConnections();
                    updateContextMenuPosition();
                }
            });

            el.addEventListener('pointerup', (e) => {
                if(isDraggingNode) {
                    isDraggingNode = false;
                    el.releasePointerCapture(e.pointerId);
                    
                    // If they just clicked without dragging, focus the text
                    if (!hasMoved) {
                        content.focus();
                        
                        // Optional: Move cursor to end
                        if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
                            const range = document.createRange();
                            range.selectNodeContents(content);
                            range.collapse(false);
                            const sel = window.getSelection();
                            sel.removeAllRanges();
                            sel.addRange(range);
                        }
                    }
                }
            });

            // Handle typing and native selection
            content.addEventListener('input', () => {
                node.text = content.innerText;
                renderConnections(); 
            });
            content.addEventListener('pointerdown', (e) => {
                if (document.activeElement === content) {
                    e.stopPropagation(); // allow text selection only if already focused
                }
            });

            const anchors = el.querySelectorAll('.anchor');
            anchors.forEach(anchor => {
                anchor.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    hideContextMenu();
                    startConnection(node.id, anchor.dataset.dir, e.clientX, e.clientY);
                    anchor.setPointerCapture(e.pointerId);
                });
                anchor.addEventListener('pointermove', (e) => {
                    if (isConnecting && currentConnection) {
                        updateTempConnection(e.clientX, e.clientY);
                    }
                });
                anchor.addEventListener('pointerup', (e) => {
                    e.stopPropagation();
                    anchor.releasePointerCapture(e.pointerId);
                    
                    if (isConnecting && currentConnection) {
                        currentConnection.tempPathEl.style.display = 'none';
                        let target = document.elementFromPoint(e.clientX, e.clientY);
                        currentConnection.tempPathEl.style.display = '';

                        if (target && target.classList.contains('anchor')) {
                            const targetNodeId = target.dataset.nodeId;
                            const targetDir = target.dataset.dir;
                            
                            if (targetNodeId !== currentConnection.fromNodeId) {
                                state.connections.push({
                                    id: 'conn-' + Date.now(),
                                    from: { node: currentConnection.fromNodeId, anchor: currentConnection.fromDir },
                                    to: { node: targetNodeId, anchor: targetDir }
                                });
                            }
                        }
                        cancelConnection();
                        renderConnections();
                    }
                });
            });

            return el;
        }

        function updateNodeDOM(el, node) {
            el.style.left = node.x + 'px';
            el.style.top = node.y + 'px';
            
            const shapeBg = el.querySelector('.node-shape-bg');
            bgColors.forEach(c => c.split(' ').forEach(cls => shapeBg.classList.remove(cls)));
            node.bgColor.split(' ').forEach(cls => shapeBg.classList.add(cls));
            
            if (node.bgColor.includes('bg-pure-white')) {
                shapeBg.classList.add('border', 'border-slate/10', 'dark:border-white/10');
            } else {
                shapeBg.classList.remove('border', 'border-slate/10', 'dark:border-white/10');
            }
            
            const content = el.querySelector('.node-content');
            textColors.forEach(c => c.split(' ').forEach(cls => content.classList.remove(cls)));
            node.textColor.split(' ').forEach(cls => content.classList.add(cls));
            
            if(document.activeElement !== content && content.innerText !== node.text) {
                content.innerText = node.text;
            }
        }

        // --- Engine: Connections ---
        let isConnecting = false;
        let currentConnection = null; 

        function getAnchorCoords(nodeId, dir) {
            const el = document.getElementById(nodeId);
            if(!el) return {x:0, y:0};
            
            const rect = el.getBoundingClientRect();
            const x = (rect.left - state.pan.x) / state.pan.scale;
            const y = (rect.top - state.pan.y) / state.pan.scale;
            const w = rect.width / state.pan.scale;
            const h = rect.height / state.pan.scale;
            
            switch(dir) {
                case 'n': return { x: x + w/2, y: y };
                case 's': return { x: x + w/2, y: y + h };
                case 'e': return { x: x + w, y: y + h/2 };
                case 'w': return { x: x, y: y + h/2 };
            }
        }

        function createCubicBezier(p1, p2, dir1, dir2) {
            const offset = 60;
            let cp1 = { ...p1 };
            let cp2 = { ...p2 };
            
            if (dir1 === 'n') cp1.y -= offset;
            else if (dir1 === 's') cp1.y += offset;
            else if (dir1 === 'e') cp1.x += offset;
            else if (dir1 === 'w') cp1.x -= offset;
            
            if (dir2 === 'n') cp2.y -= offset;
            else if (dir2 === 's') cp2.y += offset;
            else if (dir2 === 'e') cp2.x += offset;
            else if (dir2 === 'w') cp2.x -= offset;
            
            if(!dir2) {
                cp1 = { x: p1.x + (p2.x - p1.x)/2, y: p1.y };
                cp2 = { x: p1.x + (p2.x - p1.x)/2, y: p2.y };
            }

            return `M ${p1.x} ${p1.y} C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${p2.x} ${p2.y}`;
        }

        function renderConnections() {
            canvasSvg.innerHTML = '';
            state.connections.forEach(conn => {
                const p1 = getAnchorCoords(conn.from.node, conn.from.anchor);
                const p2 = getAnchorCoords(conn.to.node, conn.to.anchor);
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.classList.add('connection-line');
                path.setAttribute('d', createCubicBezier(p1, p2, conn.from.anchor, conn.to.anchor));
                canvasSvg.appendChild(path);
            });
        }

        function startConnection(nodeId, dir, clientX, clientY) {
            isConnecting = true;
            document.body.classList.add('is-connecting');
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.classList.add('connection-line', 'connection-line-temp');
            canvasSvg.appendChild(path);
            
            currentConnection = {
                fromNodeId: nodeId,
                fromDir: dir,
                tempPathEl: path
            };
            updateTempConnection(clientX, clientY);
        }

        function updateTempConnection(clientX, clientY) {
            const p1 = getAnchorCoords(currentConnection.fromNodeId, currentConnection.fromDir);
            const p2 = {
                x: (clientX - state.pan.x) / state.pan.scale,
                y: (clientY - state.pan.y) / state.pan.scale
            };
            currentConnection.tempPathEl.setAttribute('d', createCubicBezier(p1, p2, currentConnection.fromDir, null));
        }

        function cancelConnection() {
            isConnecting = false;
            document.body.classList.remove('is-connecting');
            if(currentConnection && currentConnection.tempPathEl) {
                currentConnection.tempPathEl.remove();
            }
            currentConnection = null;
        }

        // --- Engine: Context Menu ---
        function showContextMenu(node) {
            contextMenu.classList.remove('hidden');
            
            const colorBtn = document.getElementById('ctx-color');
            bgColors.forEach(c => c.split(' ').forEach(cls => colorBtn.classList.remove(cls)));
            node.bgColor.split(' ').forEach(cls => colorBtn.classList.add(cls));
            
            updateContextMenuPosition();
        }

        function hideContextMenu() {
            contextMenu.classList.add('hidden');
            state.selectedNodeId = null;
        }

        function updateContextMenuPosition() {
            if(!state.selectedNodeId) return;
            const el = document.getElementById(state.selectedNodeId);
            if(!el) return;
            const rect = el.getBoundingClientRect();
            
            contextMenu.style.left = `${rect.left + rect.width / 2}px`;
            contextMenu.style.top = `${rect.top - 60}px`;
            contextMenu.style.transform = `translateX(-50%)`;
        }

        document.getElementById('ctx-color').addEventListener('click', (e) => {
            e.stopPropagation();
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if(node) {
                const idx = bgColors.indexOf(node.bgColor);
                node.bgColor = bgColors[(idx + 1) % bgColors.length];
                
                if(node.bgColor.includes('bg-charcoal') || node.bgColor.includes('bg-slate')) {
                    node.textColor = 'text-white';
                } else {
                    node.textColor = 'text-charcoal dark:text-off-white';
                }
                
                render();
                showContextMenu(node); 
            }
        });

        document.getElementById('ctx-text-color').addEventListener('click', (e) => {
            e.stopPropagation();
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if(node) {
                const idx = textColors.indexOf(node.textColor);
                node.textColor = textColors[(idx + 1) % textColors.length];
                render();
            }
        });

        document.getElementById('ctx-delete').addEventListener('click', (e) => {
            e.stopPropagation();
            if(state.selectedNodeId) {
                state.nodes = state.nodes.filter(n => n.id !== state.selectedNodeId);
                state.connections = state.connections.filter(c => c.from.node !== state.selectedNodeId && c.to.node !== state.selectedNodeId);
                hideContextMenu();
                render();
            }
        });


        // --- Engine: FAB Interaction ---
        fabBtn.addEventListener('click', () => {
            const isHidden = fabMenu.classList.contains('opacity-0');
            if (isHidden) {
                fabMenu.classList.remove('hidden');
                void fabMenu.offsetWidth;
                fabMenu.classList.remove('scale-95', 'opacity-0');
                fabMenu.classList.add('scale-100', 'opacity-100');
                fabIcon.style.transform = 'rotate(45deg)';
            } else {
                fabMenu.classList.remove('scale-100', 'opacity-100');
                fabMenu.classList.add('scale-95', 'opacity-0');
                fabIcon.style.transform = 'rotate(0deg)';
                setTimeout(() => fabMenu.classList.add('hidden'), 300);
            }
        });

        document.querySelectorAll('.add-shape').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.shape;
                
                const cx = (window.innerWidth / 2 - state.pan.x) / state.pan.scale - 70;
                const cy = (window.innerHeight / 2 - state.pan.y) / state.pan.scale - 30;

                state.nodes.push({
                    id: 'node-' + (++idCounter),
                    type: type,
                    x: cx,
                    y: cy,
                    bgColor: 'bg-pure-white dark:bg-slate-800',
                    textColor: 'text-charcoal dark:text-off-white',
                    text: 'Process Step'
                });
                
                render();
                fabBtn.click();
            });
        });

        // --- Engine: PNG Export ---
        document.getElementById('btn-export').addEventListener('click', async () => {
            if (state.nodes.length === 0) return alert("Nothing to export!");
            
            const exportBtn = document.getElementById('btn-export');
            const originalHTML = exportBtn.innerHTML;
            exportBtn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Exporting...';
            lucide.createIcons();

            try {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                state.nodes.forEach(n => {
                    if (n.x < minX) minX = n.x;
                    if (n.y < minY) minY = n.y;
                    
                    const el = document.getElementById(n.id);
                    const w = el ? el.offsetWidth : 140;
                    const h = el ? el.offsetHeight : 60;
                    if (n.x + w > maxX) maxX = n.x + w;
                    if (n.y + h > maxY) maxY = n.y + h;
                });
                
                const pad = 80;
                minX -= pad; minY -= pad; maxX += pad; maxY += pad;
                
                const width = maxX - minX;
                const height = maxY - minY;

                const exportContainer = document.createElement('div');
                exportContainer.style.position = 'absolute';
                exportContainer.style.top = '-9999px';
                exportContainer.style.left = '-9999px';
                exportContainer.style.width = width + 'px';
                exportContainer.style.height = height + 'px';
                
                const isDark = document.documentElement.classList.contains('dark');
                exportContainer.style.backgroundColor = isDark ? '#1E1E24' : '#F8FAFC';
                exportContainer.style.overflow = 'hidden';
                exportContainer.style.zIndex = '-1000';
                
                if(isDark) {
                    exportContainer.style.backgroundImage = 'radial-gradient(rgba(255, 255, 255, 0.12) 1.5px, transparent 1.5px)';
                } else {
                    exportContainer.style.backgroundImage = 'radial-gradient(rgba(51, 65, 85, 0.12) 1.5px, transparent 1.5px)';
                }
                exportContainer.style.backgroundSize = '24px 24px';
                exportContainer.style.backgroundPosition = `${-minX}px ${-minY}px`;

                const originalSvg = document.getElementById('canvas-svg');
                const clonedSvg = originalSvg.cloneNode(true);
                clonedSvg.style.width = width + 'px';
                clonedSvg.style.height = height + 'px';
                clonedSvg.setAttribute('viewBox', `${minX} ${minY} ${width} ${height}`);
                exportContainer.appendChild(clonedSvg);
                
                const originalNodes = document.getElementById('canvas-nodes');
                const clonedNodes = originalNodes.cloneNode(true);
                clonedNodes.style.width = width + 'px';
                clonedNodes.style.height = height + 'px';
                
                Array.from(clonedNodes.children).forEach(node => {
                    const currentLeft = parseFloat(node.style.left) || 0;
                    const currentTop = parseFloat(node.style.top) || 0;
                    node.style.left = (currentLeft - minX) + 'px';
                    node.style.top = (currentTop - minY) + 'px';
                    node.classList.remove('cursor-grab', 'active:cursor-grabbing');
                    node.querySelectorAll('.anchor').forEach(a => a.style.display = 'none');
                });
                
                exportContainer.appendChild(clonedNodes);
                document.body.appendChild(exportContainer);

                await new Promise(r => setTimeout(r, 150));

                const canvas = await html2canvas(exportContainer, {
                    backgroundColor: isDark ? '#1E1E24' : '#F8FAFC',
                    width: width,
                    height: height,
                    scale: 3, 
                    useCORS: true,
                    logging: false,
                    windowWidth: width,
                    windowHeight: height
                });

                document.body.removeChild(exportContainer);

                const link = document.createElement('a');
                link.download = 'Flowchart-Creator-Export.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
            } catch (err) {
                console.error(err);
                alert("Error during PNG export");
            } finally {
                exportBtn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        });

        // --- Init State ---
        setTimeout(() => {
            state.nodes.push({ id: 'node-1', type: 'oval', x: 200, y: 150, bgColor: 'bg-pure-white dark:bg-slate-800', textColor: 'text-charcoal dark:text-off-white', text: 'Start Process' });
            state.nodes.push({ id: 'node-2', type: 'rounded-rect', x: 200, y: 350, bgColor: 'bg-mint-green dark:bg-sea-green', textColor: 'text-white', text: 'Execute Action' });
            state.connections.push({ id: 'c1', from: {node: 'node-1', anchor: 's'}, to: {node: 'node-2', anchor: 'n'} });
            idCounter = 2;
            
            state.pan.x = window.innerWidth / 2 - 270;
            state.pan.y = 50;
            updateTransform();
            render();
        }, 50);

    </script>
</body>
</html>
