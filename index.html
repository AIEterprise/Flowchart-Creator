<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Canvas Flowchart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-color: #0f172a;
            --grid-color: #1e293b;
            --node-bg: #1e293b;
            --node-border: #334155;
            --text-color: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
        }

        /* Toolbar */
        #toolbar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 16px;
            z-index: 100;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        /* Canvas Wrapper */
        #canvas-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            cursor: grab;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        #canvas-wrapper:active {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            width: 0;
            height: 0;
        }

        /* Connections */
        #connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            overflow: visible;
            pointer-events: none;
        }

        .connection-path {
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.4));
            transition: stroke 0.3s;
        }
        
        .temp-path {
            fill: none;
            stroke: var(--accent-hover);
            stroke-width: 3;
            stroke-dasharray: 8 8;
            pointer-events: none;
        }

        /* Nodes */
        .node {
            position: absolute;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid var(--node-border);
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.5);
            user-select: none;
            cursor: default;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .node:hover {
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 15px 25px -3px rgba(0, 0, 0, 0.6), 0 8px 10px -4px rgba(0, 0, 0, 0.6);
        }

        .node-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--node-border);
            font-weight: 600;
            cursor: grab;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        
        .node-header:active {
            cursor: grabbing;
        }

        .node-delete {
            background: transparent;
            color: #ef4444;
            padding: 4px;
            font-size: 18px;
            line-height: 1;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: none;
            transition: all 0.2s;
        }
        
        .node-delete:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            transform: scale(1.1);
            box-shadow: none;
        }

        .node-content {
            padding: 16px;
        }

        .node-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        
        .node-input::placeholder {
            color: #64748b;
        }

        /* Ports */
        .port {
            width: 16px;
            height: 16px;
            background: var(--bg-color);
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            cursor: crosshair;
            z-index: 10;
            transition: all 0.2s;
            box-shadow: 0 0 0 4px transparent;
        }

        .port:hover {
            background: var(--accent);
            transform: translateX(-50%) scale(1.3);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .port.top { top: -8px; }
        .port.bottom { bottom: -8px; }

        @media (max-width: 600px) {
            #toolbar {
                width: 90%;
                justify-content: center;
                bottom: 16px;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-wrapper">
        <div id="canvas">
            <svg id="connections"></svg>
            <!-- Nodes will be dynamically injected here -->
        </div>
    </div>

    <div id="toolbar">
        <button id="add-node-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add Node
        </button>
        <button id="reset-view-btn" style="background: #475569; box-shadow: 0 4px 6px -1px rgba(71, 85, 105, 0.5);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Center
        </button>
    </div>

    <script>
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const canvas = document.getElementById('canvas');
        const connectionsSvg = document.getElementById('connections');
        const addNodeBtn = document.getElementById('add-node-btn');
        const resetViewBtn = document.getElementById('reset-view-btn');

        // Canvas State
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isPanning = false;
        let startPanX = 0;
        let startPanY = 0;

        let nodes = [];
        let connections = [];
        
        // Interaction State
        let draggedNode = null;
        let nodeDragOffsetX = 0;
        let nodeDragOffsetY = 0;

        let connectingFromPort = null;
        let tempConnection = null;

        let initialPinchDistance = null;
        let initialScale = 1;

        // Visual Updates
        function updateCanvasTransform() {
            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            canvasWrapper.style.backgroundPosition = `${translateX}px ${translateY}px`;
            canvasWrapper.style.backgroundSize = `${24 * scale}px ${24 * scale}px`;
        }

        function resetView() {
            scale = 1;
            translateX = window.innerWidth / 2;
            translateY = window.innerHeight / 2;
            updateCanvasTransform();
        }

        resetView(); // Init view

        // --- Event Listeners for Canvas Panning and Zooming ---

        canvasWrapper.addEventListener('wheel', (e) => {
            if (e.ctrlKey || e.metaKey) {
                // Pinch-to-zoom on trackpad / Ctrl+Scroll
                e.preventDefault();
                const zoomFactor = 1.05;
                const delta = e.deltaY < 0 ? zoomFactor : 1 / zoomFactor;
                
                const rect = canvasWrapper.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const newScale = Math.min(Math.max(0.1, scale * delta), 5);
                const ratio = newScale / scale;

                translateX = mouseX - (mouseX - translateX) * ratio;
                translateY = mouseY - (mouseY - translateY) * ratio;
                scale = newScale;
                
                updateCanvasTransform();
            } else {
                // Two-finger pan
                translateX -= e.deltaX;
                translateY -= e.deltaY;
                updateCanvasTransform();
            }
        }, { passive: false });

        canvasWrapper.addEventListener('pointerdown', (e) => {
            if (e.target === canvasWrapper || (e.target.closest('#canvas') && e.target === canvasWrapper)) {
                isPanning = true;
                startPanX = e.clientX - translateX;
                startPanY = e.clientY - translateY;
                canvasWrapper.setPointerCapture(e.pointerId);
            }
        });

        canvasWrapper.addEventListener('pointermove', (e) => {
            if (isPanning) {
                translateX = e.clientX - startPanX;
                translateY = e.clientY - startPanY;
                updateCanvasTransform();
            }
            
            if (connectingFromPort) {
                updateTempConnection(e.clientX, e.clientY);
            }
        });

        canvasWrapper.addEventListener('pointerup', (e) => {
            if (isPanning) {
                isPanning = false;
                canvasWrapper.releasePointerCapture(e.pointerId);
            }
            
            if (connectingFromPort) {
                if (tempConnection) {
                    tempConnection.remove();
                    tempConnection = null;
                }
                connectingFromPort = null;
            }
        });

        // Touch Pinch Zoom specific
        canvasWrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPanning = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialScale = scale;
            }
        }, {passive: false});

        canvasWrapper.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                const delta = currentDistance / initialPinchDistance;
                const newScale = Math.min(Math.max(0.1, initialScale * delta), 5);
                
                const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                
                const ratio = newScale / scale;
                translateX = centerX - (centerX - translateX) * ratio;
                translateY = centerY - (centerY - translateY) * ratio;
                scale = newScale;
                
                updateCanvasTransform();
            }
        }, {passive: false});

        // --- Node Logic ---
        let nodeIdCounter = 0;

        function createNode(x, y, title = '') {
            const id = 'node_' + (nodeIdCounter++);
            const nodeEl = document.createElement('div');
            nodeEl.className = 'node';
            nodeEl.id = id;
            nodeEl.style.left = x + 'px';
            nodeEl.style.top = y + 'px';

            nodeEl.innerHTML = `
                <div class="port top" data-node-id="${id}" data-port-type="top"></div>
                <div class="node-header">
                    <span>${title || 'Step ' + nodeIdCounter}</span>
                    <button class="node-delete" title="Delete node">&times;</button>
                </div>
                <div class="node-content">
                    <textarea class="node-input" rows="3" placeholder="Describe this step..."></textarea>
                </div>
                <div class="port bottom" data-node-id="${id}" data-port-type="bottom"></div>
            `;

            canvas.appendChild(nodeEl);
            nodes.push({ id, el: nodeEl, x, y });

            // Dragging
            const header = nodeEl.querySelector('.node-header');
            header.addEventListener('pointerdown', (e) => {
                if (e.target.classList.contains('node-delete')) return;
                e.stopPropagation();
                draggedNode = id;
                const rect = nodeEl.getBoundingClientRect();
                
                // Calculate offset in local canvas space
                const localX = (e.clientX - translateX) / scale;
                const localY = (e.clientY - translateY) / scale;
                const nodeLocalX = parseFloat(nodeEl.style.left);
                const nodeLocalY = parseFloat(nodeEl.style.top);
                
                nodeDragOffsetX = localX - nodeLocalX;
                nodeDragOffsetY = localY - nodeLocalY;
                
                header.setPointerCapture(e.pointerId);
                // Bring to front
                canvas.appendChild(nodeEl);
            });

            header.addEventListener('pointermove', (e) => {
                if (draggedNode === id) {
                    const localX = (e.clientX - translateX) / scale;
                    const localY = (e.clientY - translateY) / scale;
                    
                    const newX = localX - nodeDragOffsetX;
                    const newY = localY - nodeDragOffsetY;
                    
                    nodeEl.style.left = newX + 'px';
                    nodeEl.style.top = newY + 'px';
                    
                    const nodeData = nodes.find(n => n.id === id);
                    if(nodeData) {
                        nodeData.x = newX;
                        nodeData.y = newY;
                    }
                    updateConnections();
                }
            });

            header.addEventListener('pointerup', (e) => {
                if(draggedNode === id) {
                    draggedNode = null;
                    header.releasePointerCapture(e.pointerId);
                }
            });

            // Delete
            nodeEl.querySelector('.node-delete').addEventListener('click', (e) => {
                e.stopPropagation();
                nodeEl.style.transform = 'scale(0.8)';
                nodeEl.style.opacity = '0';
                setTimeout(() => {
                    canvas.removeChild(nodeEl);
                    nodes = nodes.filter(n => n.id !== id);
                    connections = connections.filter(c => c.from.nodeId !== id && c.to.nodeId !== id);
                    updateConnections();
                }, 150);
            });
            
            // Port interactions for connections
            const ports = nodeEl.querySelectorAll('.port');
            ports.forEach(port => {
                port.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    connectingFromPort = {
                        nodeId: port.dataset.nodeId,
                        type: port.dataset.portType,
                        el: port
                    };
                    
                    tempConnection = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    tempConnection.classList.add('temp-path');
                    connectionsSvg.appendChild(tempConnection);
                    port.setPointerCapture(e.pointerId);
                });
                
                port.addEventListener('pointermove', (e) => {
                    if (connectingFromPort) {
                        updateTempConnection(e.clientX, e.clientY);
                    }
                });

                port.addEventListener('pointerup', (e) => {
                    e.stopPropagation();
                    
                    // Look for element under pointer to see if we dropped on another port
                    // Hide temp elements momentarily to get element underneath
                    if (tempConnection) tempConnection.style.display = 'none';
                    const targetEl = document.elementFromPoint(e.clientX, e.clientY);
                    if (tempConnection) tempConnection.style.display = '';

                    const isPort = targetEl && targetEl.classList.contains('port');
                    
                    if (connectingFromPort && isPort && targetEl !== connectingFromPort.el) {
                        // Prevent connecting node to itself directly
                        if (connectingFromPort.nodeId !== targetEl.dataset.nodeId) {
                            connections.push({
                                from: connectingFromPort,
                                to: {
                                    nodeId: targetEl.dataset.nodeId,
                                    type: targetEl.dataset.portType,
                                    el: targetEl
                                }
                            });
                            updateConnections();
                        }
                    }
                    
                    if (tempConnection) {
                        tempConnection.remove();
                        tempConnection = null;
                    }
                    connectingFromPort = null;
                    port.releasePointerCapture(e.pointerId);
                });
            });

            nodeEl.querySelector('.node-input').addEventListener('pointerdown', (e) => e.stopPropagation());
        }

        // --- Connections Logic ---
        function getPortCoordinates(nodeId, type) {
            const nodeEl = document.getElementById(nodeId);
            if(!nodeEl) return {x:0, y:0};
            
            const nodeX = parseFloat(nodeEl.style.left);
            const nodeY = parseFloat(nodeEl.style.top);
            const width = 220; // Match CSS
            
            const portX = nodeX + width / 2;
            const portY = type === 'top' ? nodeY - 8 : nodeY + nodeEl.offsetHeight + 8;
            
            return { x: portX, y: portY };
        }

        function createBezierPath(x1, y1, x2, y2, type1, type2) {
            const dy = Math.abs(y2 - y1);
            // Dynamic control points based on distance and port direction
            let cpY1 = y1 + (type1 === 'bottom' ? Math.max(dy / 2, 50) : -Math.max(dy / 2, 50));
            let cpY2 = y2 + (type2 === 'top' ? -Math.max(dy / 2, 50) : Math.max(dy / 2, 50));
            
            // If dragging dynamically, we might not have a second port type yet.
            if (!type2) {
                cpY1 = y1 + Math.max(Math.abs(y2 - y1) / 2, 50) * (type1 === 'bottom' ? 1 : -1);
                cpY2 = y2 - Math.max(Math.abs(y2 - y1) / 2, 50) * (type1 === 'bottom' ? 1 : -1);
            }

            return \`M \${x1} \${y1} C \${x1} \${cpY1}, \${x2} \${cpY2}, \${x2} \${y2}\`;
        }

        function updateConnections() {
            connectionsSvg.innerHTML = ''; 
            connections.forEach(conn => {
                const fromCoords = getPortCoordinates(conn.from.nodeId, conn.from.type);
                const toCoords = getPortCoordinates(conn.to.nodeId, conn.to.type);
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.classList.add('connection-path');
                path.setAttribute('d', createBezierPath(fromCoords.x, fromCoords.y, toCoords.x, toCoords.y, conn.from.type, conn.to.type));
                connectionsSvg.appendChild(path);
            });
        }

        function updateTempConnection(mouseX, mouseY) {
            if (!tempConnection || !connectingFromPort) return;
            
            const fromCoords = getPortCoordinates(connectingFromPort.nodeId, connectingFromPort.type);
            const toX = (mouseX - translateX) / scale;
            const toY = (mouseY - translateY) / scale;
            
            tempConnection.setAttribute('d', createBezierPath(fromCoords.x, fromCoords.y, toX, toY, connectingFromPort.type, null));
        }

        // --- Toolbar Actions ---
        addNodeBtn.addEventListener('click', () => {
            const cx = -translateX / scale + window.innerWidth / (2 * scale) - 110;
            const cy = -translateY / scale + window.innerHeight / (2 * scale) - 75;
            createNode(cx, cy);
        });

        resetViewBtn.addEventListener('click', resetView);

        // --- Demo Initialization ---
        setTimeout(() => {
            createNode(-110, -200, "Start");
            createNode(-110, 50, "Action");
            
            setTimeout(() => {
                const fromPort = document.querySelector('#node_0 .port.bottom');
                const toPort = document.querySelector('#node_1 .port.top');
                if(fromPort && toPort) {
                    connections.push({
                        from: { nodeId: 'node_0', type: 'bottom', el: fromPort },
                        to: { nodeId: 'node_1', type: 'top', el: toPort }
                    });
                    updateConnections();
                }
            }, 50);
        }, 100);

    </script>
</body>
</html>
